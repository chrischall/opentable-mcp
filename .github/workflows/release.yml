name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Sync manifest.json version from package.json and build .mcpb
      - name: Build .mcpb bundle
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          npx @anthropic-ai/mcpb pack
          mv opentable-mcp.mcpb "opentable-mcp-${VERSION}.mcpb"

      # Publish to npm. Non-blocking — the MCPB bundle + GitHub Release
      # are the primary distribution; npm is a bonus. First-time publish
      # of a fresh package name requires the npm account to have publish
      # rights and (for public packages) to have completed 2FA setup, so
      # we tolerate failures and surface them in the workflow log.
      #
      # Prerelease versions (e.g. 0.3.0-alpha.2) must be published under
      # a non-"latest" dist-tag, otherwise `npm install opentable-mcp`
      # would pick up an alpha.
      - name: Publish to npm
        continue-on-error: true
        run: |
          if [[ "$VERSION" == *-* ]]; then
            PRETAG=$(echo "$VERSION" | sed -E 's/.*-([^.0-9]+).*/\1/')
            npm publish --access public --provenance --tag "$PRETAG"
          else
            npm publish --access public --provenance
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            opentable-mcp-${{ env.VERSION }}.mcpb
          generate_release_notes: true
